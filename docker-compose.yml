# Local development stack. Run: docker compose up --build
# Backend on :8000 (docs at /docs), frontend on :3000.
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - backend_data:/data
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/app.db
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: "*"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
